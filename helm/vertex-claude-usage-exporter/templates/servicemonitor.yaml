{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "vertex-claude-usage-exporter.fullname" . }}-pushgateway
  labels:
    {{- include "vertex-claude-usage-exporter.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "vertex-claude-usage-exporter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pushgateway
  endpoints:
    - port: http
      interval: {{ .Values.serviceMonitor.interval }}
      honorLabels: true
{{- end }}
