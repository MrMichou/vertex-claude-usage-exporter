changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: New Features
      labels:
        - enhancement
        - feature
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Infrastructure & CI
      labels:
        - ci
        - infrastructure
        - helm
        - docker
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
