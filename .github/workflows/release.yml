name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and image name
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Verify Helm chart version matches tag
        run: |
          chart_version=$(grep '^version:' helm/vertex-claude-usage-exporter/Chart.yaml | awk '{print $2}' | tr -d '[:space:]')
          if [ "$chart_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: Chart version ($chart_version) does not match tag (${{ steps.version.outputs.version }})"
            echo "Update helm/vertex-claude-usage-exporter/Chart.yaml before tagging."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
          labels: |
            org.opencontainers.image.title=vertex-claude-usage-exporter
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Export Claude/Anthropic usage metrics from GCP Vertex AI to Prometheus
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package helm/vertex-claude-usage-exporter \
            --destination .helm-packages/

      - name: Push Helm chart to GHCR
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          helm push .helm-packages/vertex-claude-usage-exporter-${{ steps.version.outputs.version }}.tgz \
            "oci://ghcr.io/${OWNER,,}/charts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .helm-packages/*.tgz
