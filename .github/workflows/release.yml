name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify Helm chart version matches tag
        run: |
          chart_version=$(grep '^version:' helm/vertex-claude-usage-exporter/Chart.yaml | awk '{print $2}')
          if [ "$chart_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: Chart version ($chart_version) does not match tag (${{ steps.version.outputs.version }})"
            echo "Update helm/vertex-claude-usage-exporter/Chart.yaml before tagging."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package Helm chart
        run: |
          helm package helm/vertex-claude-usage-exporter \
            --destination .helm-packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .helm-packages/*.tgz
