name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check scripts/

      - name: Check formatting
        run: ruff format --check scripts/

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/vertex-claude-usage-exporter

      - name: Template Helm chart
        run: |
          helm template test helm/vertex-claude-usage-exporter \
            --set config.gcpProjectId=test-project \
            --set config.pushgatewayUrl=pushgateway:9091

  docker:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vertex-claude-usage-exporter:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
